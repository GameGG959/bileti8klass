<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Геометрия 8 класс | Билеты + Все задачи с решениями</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 10% 20%, #0b1120, #030614);
            color: #eef3ff;
            padding: 1.5rem;
            min-height: 100vh;
        }

        /* анимационный фон */
        .bg-glow {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            overflow: hidden;
        }
        .glow {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(70,130,255,0.2), transparent);
            filter: blur(70px);
            animation: drift 25s infinite alternate;
        }
        .g1 { top: -200px; left: -200px; }
        .g2 { bottom: -100px; right: -100px; background: rgba(255,80,140,0.15); animation-duration: 30s; }
        .g3 { top: 40%; left: 60%; width: 400px; height: 400px; background: rgba(0,230,200,0.1); animation-duration: 20s; }
        @keyframes drift {
            0% { transform: translate(0,0) scale(1); opacity: 0.4; }
            100% { transform: translate(80px, 60px) scale(1.3); opacity: 0.8; }
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 2;
        }

        /* табы */
        .tabs {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .tab-btn {
            background: rgba(20, 35, 70, 0.7);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(80, 130, 255, 0.5);
            padding: 0.8rem 2rem;
            border-radius: 60px;
            font-weight: 600;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            color: #ccdeff;
        }
        .tab-btn.active {
            background: linear-gradient(135deg, #2b5fdf, #173e9b);
            border-color: #fff6b0;
            color: white;
            box-shadow: 0 0 15px #3e7eff;
        }
        .tab-btn:hover {
            transform: translateY(-2px);
            background: rgba(60, 100, 200, 0.8);
        }

        .tab-content {
            display: none;
            animation: fade 0.3s ease;
        }
        .tab-content.active-tab {
            display: block;
        }
        @keyframes fade {
            from { opacity: 0; transform: translateY(10px);}
            to { opacity: 1; transform: translateY(0);}
        }

        /* сетка билетов */
        .tickets-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        .ticket-card {
            background: rgba(15, 25, 55, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid #3a5fcc;
            border-radius: 2rem;
            padding: 0.7rem 1.4rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
            font-size: 1rem;
        }
        .ticket-card.active, .ticket-card:hover {
            background: #2c5ad0;
            transform: scale(1.02);
            border-color: white;
        }
        .detail-panel {
            background: rgba(8, 14, 30, 0.7);
            backdrop-filter: blur(20px);
            border-radius: 2rem;
            padding: 1.8rem;
            border: 1px solid #4a72dd;
        }
        .theory-item {
            background: #0f1733aa;
            border-left: 5px solid #ffb347;
            padding: 1rem;
            border-radius: 1.2rem;
            margin-bottom: 1.2rem;
        }
        .problem-solution {
            background: #03071eaa;
            padding: 1rem;
            border-radius: 1.2rem;
            margin-top: 1rem;
        }
        .badge {
            background: #ffb34730;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.8rem;
            margin-bottom: 0.8rem;
        }
        .problems-list {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        .problem-card {
            background: #0b1230cc;
            border-radius: 1.5rem;
            padding: 1.2rem;
            border: 1px solid #2f4288;
            transition: 0.1s;
        }
        .problem-text {
            font-weight: 600;
            background: #00000050;
            padding: 0.7rem;
            border-radius: 1rem;
            margin-bottom: 1rem;
            font-size: 1rem;
            border-left: 4px solid #ffb347;
        }
        .solution-block {
            margin-top: 0.8rem;
            background: #0a1025;
            border-radius: 1rem;
            padding: 1rem;
        }
        .solution-step {
            margin-bottom: 0.8rem;
            line-height: 1.5;
        }
        .solution-step strong {
            color: #ffd966;
        }
        .answer {
            background: #1f2a4e;
            padding: 0.5rem 1rem;
            border-radius: 2rem;
            display: inline-block;
            margin-top: 0.5rem;
            font-weight: bold;
            color: #ffecb3;
        }
        hr {
            border-color: #2a4188;
            margin: 1rem 0;
        }
        h1 {
            font-size: 2.4rem;
            background: linear-gradient(135deg, #fff, #b0d0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-align: center;
        }
        .sub {
            text-align: center;
            color: #aac2ff;
            margin-bottom: 1.5rem;
        }
        footer {
            text-align: center;
            margin-top: 3rem;
            font-size: 0.75rem;
            opacity: 0.6;
        }
        @media (max-width: 700px) {
            body { padding: 1rem; }
            .ticket-card { padding: 0.5rem 1rem; font-size: 0.8rem; }
        }
        .definition-memo {
            background: #1e2a5e50;
            border-radius: 20px;
            padding: 10px 15px;
            margin-top: 10px;
            font-style: italic;
            border-left: 4px solid gold;
        }
        .formula {
            font-family: monospace;
            background: #00000055;
            padding: 2px 6px;
            border-radius: 12px;
        }
    </style>
</head>

<div class="bg-glow">
    <div class="glow g1"></div>

</div>
<div class="container">
    <h1>📐 Геометрия | 8 класс</h1>

    <div class="tabs">
        <div class="tab-btn active" data-tab="tickets">🎫 Билеты (теория + задача)</div>

    <!-- Вкладка БИЛЕТЫ -->

</div>

<script>
    // ===================== 1. ТЕОРИЯ ДЛЯ БИЛЕТОВ (ПОЛНОСТЬЮ СООТВЕТСТВУЕТ ЭКЗАМЕНАЦИОННЫМ БИЛЕТАМ) =====================
    const ticketsTheory = {
        1: {
            part1: `<strong>Прямоугольник</strong> — это параллелограмм, у которого все углы прямые (90°).<br>
                    <strong>Свойства:</strong> 
                    <ul><li>Противоположные стороны равны и параллельны.</li>
                    <li>Все углы прямые.</li>
                    <li>Диагонали равны.</li></ul>
                    <strong>Признаки:</strong> 
                    <ul><li>Если в параллелограмме один угол прямой → прямоугольник.</li>
                    <li>Если диагонали параллелограмма равны → прямоугольник.</li></ul>
                    <strong>Квадрат</strong> — это прямоугольник, у которого все стороны равны (или ромб с прямым углом).<br>
                    <strong>Свойства:</strong> 
                    <ul><li>Все углы прямые.</li>
                    <li>Стороны равны.</li>
                    <li>Диагонали равны, взаимно перпендикулярны и являются биссектрисами углов.</li></ul>
                    <strong>Признаки:</strong> 
                    <ul><li>Если в прямоугольнике смежные стороны равны → квадрат.</li>
                    <li>Если в ромбе один угол прямой → квадрат.</li></ul>`,
            part2: `<strong>Свойство биссектрисы треугольника:</strong> Биссектриса внутреннего угла треугольника делит противоположную сторону на отрезки, пропорциональные прилежащим сторонам.<br>
                    <strong>Доказательство:</strong> Пусть в ΔABC AD — биссектриса. Проведём высоты из B и C к прямой AD. Площади треугольников ABD и ACD относятся как BD:DC (общая высота из A). С другой стороны, эти площади равны ½·AB·AD·sin∠BAD и ½·AC·AD·sin∠CAD. Так как ∠BAD = ∠CAD, то AB/AC = BD/DC.`
        },
        2: {
            part1: `<strong>Описанная окружность четырёхугольника</strong> — окружность, проходящая через все его вершины.<br>
                    <strong>Теорема:</strong> Около четырёхугольника можно описать окружность ⇔ сумма противоположных углов = 180°.<br>
                    <strong>Вписанная окружность четырёхугольника</strong> — окружность, касающаяся всех его сторон.<br>
                    <strong>Теорема:</strong> В четырёхугольник можно вписать окружность ⇔ суммы противоположных сторон равны.<br>
                    <strong>Теорема о вписанном угле:</strong> Вписанный угол равен половине центрального угла, опирающегося на ту же дугу, и равен половине дуги, на которую он опирается.`,
            part2: `<strong>Площадь параллелограмма:</strong> S = a·h, где a — основание, h — высота, проведённая к этому основанию.<br>
                    <strong>Доказательство:</strong> Достроим параллелограмм до прямоугольника, отрезав прямоугольный треугольник с одной стороны и приставив его к другой. Получим прямоугольник с той же высотой и основанием a. Площадь прямоугольника = a·h, следовательно, и площадь параллелограмма = a·h.`
        },
        3: {
            part1: `<strong>Трапеция</strong> — четырёхугольник, у которого две стороны параллельны (основания), а две другие — нет (боковые стороны).<br>
                    <strong>Виды:</strong> равнобедренная (боковые стороны равны), прямоугольная (один угол 90°).<br>
                    <strong>Свойства равнобедренной трапеции:</strong> 
                    <ul><li>Углы при каждом основании равны.</li>
                    <li>Диагонали равны.</li></ul>
                    <strong>Средняя линия трапеции</strong> — отрезок, соединяющий середины боковых сторон. Она параллельна основаниям и равна их полусумме.`,
            part2: `<strong>Теорема Пифагора:</strong> В прямоугольном треугольнике квадрат гипотенузы равен сумме квадратов катетов: c² = a² + b².<br>
                    <strong>Доказательство:</strong> На гипотенузе строят квадрат, а на катетах — квадраты. Затем доказывают, что площадь квадрата на гипотенузе равна сумме площадей квадратов на катетах (например, через разбиение на равные треугольники или подобие).`
        },
        4: {
            part1: `<strong>Подобные треугольники</strong> — треугольники, у которых углы соответственно равны, а стороны одного пропорциональны сходственным сторонам другого. Коэффициент подобия k — число, равное отношению сходственных сторон.<br>
                    <strong>Лемма о подобных треугольниках:</strong> Прямая, параллельная стороне треугольника, отсекает от него треугольник, подобный данному.<br>
                    <strong>Отношение периметров подобных треугольников</strong> равно коэффициенту подобия.`,
            part2: `<strong>Площадь прямоугольного треугольника:</strong> S = ½·a·b, где a и b — катеты.<br>
                    <strong>Доказательство:</strong> Достроим треугольник до прямоугольника со сторонами a и b. Площадь прямоугольника = a·b, треугольник составляет его половину, поэтому S = ½·a·b.`
        },
        5: {
            part1: `<strong>Свойства площадей:</strong><br>
                    1. Равные фигуры имеют равные площади.<br>
                    2. Если фигура составлена из нескольких фигур, не имеющих общих внутренних точек, то её площадь равна сумме площадей этих фигур.<br>
                    3. Площадь квадрата со стороной a равна a².<br>
                    <strong>Площадь прямоугольника:</strong> S = a·b, где a, b — смежные стороны.`,
            part2: `<strong>Теорема о вписанном угле:</strong> Вписанный угол измеряется половиной дуги, на которую он опирается.<br>
                    <strong>Доказательство:</strong> Рассматривают три случая: центр окружности лежит на стороне угла, внутри угла, вне угла. В каждом случае используют свойство внешнего угла треугольника и центральный угол.`
        },
        6: {
            part1: `<strong>Четырёхугольник</strong> — фигура, состоящая из четырёх точек (вершин) и четырёх отрезков (сторон), соединяющих их.<br>
                    <strong>Сумма углов четырёхугольника</strong> равна 360°.<br>
                    <strong>Доказательство:</strong> Проведём диагональ, получим два треугольника. Сумма углов каждого треугольника 180°, общая сумма 360°.`,
            part2: `<strong>Средняя линия треугольника</strong> — отрезок, соединяющий середины двух сторон. Она параллельна третьей стороне и равна её половине.<br>
                    <strong>Доказательство:</strong> Через середины сторон проводят прямую, доказывают, что она параллельна основанию, используя теорему Фалеса или свойство параллелограмма.`
        },
        7: {
            part1: `<strong>Определения для острого угла прямоугольного треугольника:</strong><br>
                    sin α = противолежащий катет / гипотенуза<br>
                    cos α = прилежащий катет / гипотенуза<br>
                    tg α = противолежащий катет / прилежащий катет<br>
                    ctg α = прилежащий катет / противолежащий катет<br>
                    <strong>Основные тригонометрические формулы:</strong> sin²α+cos²α=1; tgα = sinα/cosα; ctgα = cosα/sinα; tgα·ctgα=1.`,
            part2: `<strong>Признак параллелограмма:</strong> Если в четырёхугольнике две стороны равны и параллельны, то это параллелограмм.<br>
                    <strong>Доказательство:</strong> Проведём диагональ. Полученные треугольники равны по двум сторонам и углу между ними (накрест лежащие). Из равенства следует, что другие две стороны параллельны. Значит, четырёхугольник — параллелограмм.`
        },
        8: {
            part1: `<strong>Значения синуса, косинуса, тангенса для углов 30°, 45°, 60°:</strong><br>
                    30°: sin=½, cos=√3/2, tg=√3/3<br>
                    45°: sin=√2/2, cos=√2/2, tg=1<br>
                    60°: sin=√3/2, cos=½, tg=√3<br>
                    <strong>Основные формулы:</strong> sin²α+cos²α=1; tgα = sinα/cosα; 1+tg²α = 1/cos²α.`,
            part2: `<strong>Свойства параллелограмма:</strong> Противоположные стороны равны; противоположные углы равны; диагонали пересекаются и точкой пересечения делятся пополам.<br>
                    <strong>Доказательство (на примере равенства сторон):</strong> Проведём диагональ. ΔABC = ΔCDA по стороне и двум прилежащим углам (накрест лежащие). Из равенства следует AB=CD, BC=AD.`
        },
        9: {
            part1: `<strong>Свойство пересекающихся хорд:</strong> Если две хорды AB и CD пересекаются в точке E, то AE·EB = CE·ED.<br>
                    <strong>Свойство касательной и секущей:</strong> Если из точки M проведены касательная MK (K — точка касания) и секущая, пересекающая окружность в A и B, то MK² = MA·MB.`,
            part2: `<strong>Первый признак подобия треугольников (по двум углам):</strong> Если два угла одного треугольника соответственно равны двум углам другого, то такие треугольники подобны.<br>
                    <strong>Доказательство:</strong> Наложим треугольники так, чтобы равные углы совпали. Третьи углы также равны. По теореме о пропорциональных отрезках стороны, лежащие против равных углов, пропорциональны.`
        },
        10: {
            part1: `<strong>Пропорциональные отрезки</strong> — отрезки, длины которых образуют пропорцию.<br>
                    <strong>Теорема о пропорциональных отрезках:</strong> Если параллельные прямые пересекают стороны угла, то отрезки, отсекаемые на одной стороне угла, пропорциональны соответствующим отрезкам на другой стороне.<br>
                    <strong>Следствие:</strong> Параллельные прямые отсекают на сторонах угла пропорциональные отрезки.`,
            part2: `<strong>Ромб</strong> — параллелограмм, у которого все стороны равны.<br>
                    <strong>Свойства ромба:</strong> 
                    <ul><li>Диагонали взаимно перпендикулярны.</li>
                    <li>Диагонали являются биссектрисами его углов.</li></ul>
                    <strong>Доказательство:</strong> Рассмотрим треугольники, образованные диагоналями. Равенство сторон и свойство медианы в равнобедренном треугольнике дают перпендикулярность и биссектрисы.`
        },
        11: {
            part1: `<strong>Метрические соотношения в прямоугольном треугольнике:</strong><br>
                    Высота, проведённая из вершины прямого угла, есть среднее пропорциональное между проекциями катетов на гипотенузу: h² = aₓ·bₓ.<br>
                    Катет есть среднее пропорциональное между гипотенузой и его проекцией на гипотенузу: a² = c·aₓ, b² = c·bₓ.<br>
                    <span class="definition-memo">✨ Запомни: высота — среднее геометрическое проекций, катет — среднее геометрическое гипотенузы и своей проекции.</span>`,
            part2: `<strong>Площадь треугольника:</strong> 
                    <ul><li>S = ½·a·hₐ (основание на высоту)</li>
                    <li>S = ½·ab·sinγ (через две стороны и угол)</li>
                    <li>Формула Герона: S = √(p(p−a)(p−b)(p−c)), где p = (a+b+c)/2</li></ul>
                    <strong>Доказательство S = ½·a·h:</strong> Достроим треугольник до параллелограмма. Площадь параллелограмма = a·h, а треугольник составляет его половину.`
        },
        12: {

        { text: "5. Высота AH ромба ABCD делит сторону CD на отрезки DH=8 и CH=2. Найдите высоту ромба.",
          solution: `<strong>Дано:</strong> ABCD — ромб, AH⊥CD, DH=8, CH=2.<br>

        { text: "7. Отрезки АВ и СD являются хордами окружности. Найдите длину хорды CD, если АВ=40, расстояние от центра окружности до хорд АВ и CD равны соответственно 21 и 20.",

        { text: "10. Окружность, вписанная в треугольник АВС, касается его сторон в точках M, N, Р. Найдите углы треугольника АВС, если углы треугольника MNP равны 52°, 56° и 72°.",

          solution: `<strong>Дано:</strong> ΔABC, ∠B=90°, BH⊥AC, окружность с диаметром BH пересекает AB в P, BC в K. PK=15.<br>

        { text: "12. Отрезки АВ и CD лежат на параллельных прямых, а отрезки АС и BD пересекаются в точке М. Найдите МС, если АВ=15, DC=30, АС=39.",

        { text: "13. Биссектрисы углов А и В при боковой стороне АВ трапеции ABCD пересекаются в точке F. Найдите АВ, если AF=21, BF=20.",

        { text: "14. Найдите боковую сторону АВ трапеции ABCD, если углы АВС и BCD равны соответственно 30° и 120°, а CD=25.",

          solution: `<strong>Дано:</strong> ромб, точка пересечения диагоналей O, расстояние от O до стороны = 17, диагональ d₁=68.<br>

        { text: "17. Угол, противолежащий основанию равнобедренного треугольника, равен 120°, а высота, проведенная к боковой стороне, равна 8 см. Найдите основание треугольника.",

          solution: `<strong>Дано:</strong> параллелограмм, из вершины A проведены высоты AH₁ и AH₂ к сторонам, угол между ними =130°.<br>
                    <strong>Найти:</strong> углы параллелограмма.<br>
                    <strong>Решение:</strong> Угол между высотами, проведёнными из одной вершины, равен углу между сторонами параллелограмма (или смежному с ним). Т.к. высоты перпендикулярны сторонам, то угол между высотами = 180° − угол параллелограмма. Следовательно, 180°−α = 130° ⇒ α=50° (острый). Тогда тупой угол = 180°−50°=130°.<br>
                    <strong>Ответ:</strong> 50°,130°,50°,130°.` },
        { text: "20. Один из углов прямоугольной трапеции равен 135°, средняя линия -21 см, а основания относятся как 5 : 2. Найдите меньшую боковую сторону трапеции.",
          solution: `<strong>Дано:</strong> прямоугольная трапеция, ∠C=135°, средняя линия m=21, основания относятся 5:2.<br>
                    <strong>Найти:</strong> меньшую боковую сторону (высоту).<br>
                    <strong>Решение:</strong> Пусть основания 5x и 2x, тогда m = (5x+2x)/2 = 3,5x = 21 ⇒ x=6. Основания: 30 и 12. Разность оснований = 18. Угол 135° прилежит к большему основанию, значит острый угол при другом основании = 45°. Высота = разность оснований = 18. Меньшая боковая сторона = высоте = 18.<br>
                    <strong>Ответ:</strong> 18 см.` },
        { text: "21. В трапеции ABCD известно, что угол В равен 90°, угол С равен 150°, ВС=5 см. Найдите сторону CD, если высота трапеции, проведённая из вершины С, разбивает данную трапецию на треугольник и квадрат.",
          solution: `<strong>Дано:</strong> трапеция ABCD, ∠B=90°, ∠C=150°, BC=5, высота из C на AD разбивает на квадрат и треугольник.<br>
                    <strong>Найти:</strong> CD.<br>
                    <strong>Решение:</strong> Так как высота из C и AD⊥AB, то образуется квадрат: значит BC=CH=5 (CH — высота). В треугольнике, который образуется при проведении высоты, угол при вершине C = 150°−90°=60°. В прямоугольном треугольнике CHD: ∠HCD=60°, CH=5 ⇒ CD = CH / cos60° = 5 / 0,5 = 10.<br>
                    <strong>Ответ:</strong> 10.` },
        { text: "22. Биссектрисы углов А и В параллелограмма ABCD пересекаются в точке М, АВ=6см. Найдите радиус окружности, которая проходит через точки А, В, М.",
          solution: `<strong>Дано:</strong> ABCD — параллелограмм, биссектрисы ∠A и ∠B пересекаются в M, AB=6.<br>
                    <strong>Найти:</strong> радиус окружности, описанной около ΔABM.<br>
                    <strong>Решение:</strong> ∠A+∠B=180°, их биссектрисы делят углы пополам ⇒ ∠MAB+∠MBA = ½(∠A+∠B)=90° ⇒ ∠AMB=90°. Значит, ΔABM прямоугольный с гипотенузой AB. Радиус описанной окружности около прямоугольного треугольника равен половине гипотенузы: R = AB/2 = 6/2 = 3.<br>
                    <strong>Ответ:</strong> 3.` },
        { text: "23. Периметр параллелограмма равен 48 см. Биссектриса тупого угла делит его сторону в отношении 2 : 1, считая от вершины острого угла. Может ли меньшая сторона параллелограмма быть равной 7 см?",
          solution: `<strong>Дано:</strong> P=48, биссектриса тупого угла делит сторону в отношении 2:1 от острого угла.<br>
                    <strong>Найти:</strong> может ли меньшая сторона равняться 7?<br>
                    <strong>Решение:</strong> Пусть меньшая сторона = a, большая = b. Биссектриса тупого угла отсекает равнобедренный треугольник, где отрезок от острого угла до биссектрисы равен меньшей стороне? По условию отношение 2:1, значит, сторона делится на части a и 2a (если меньшая сторона a, то большая часть от острого угла = a, другая = 2a, тогда b = a+2a=3a. P=2(a+3a)=8a=48 ⇒ a=6. Меньшая сторона =6, а не 7. Ответ: нет, не может.<br>
                    <strong>Ответ:</strong> нет.` },
        { text: "24. В равнобокой трапеции диагональ является биссектрисой тупого угла и делит среднюю линию трапеции на отрезки длиной 7 см и 11 см. Найдите периметр трапеции.",
          solution: `<strong>Дано:</strong> равнобедренная трапеция, диагональ — биссектриса тупого угла, средняя линия делится на 7 и 11.<br>
                    <strong>Найти:</strong> P.<br>
                    <strong>Решение:</strong> Средняя линия = 7+11=18 ⇒ сумма оснований = 36. Биссектриса тупого угла отсекает равнобедренный треугольник, поэтому меньшее основание = 2·7=14, большее = 2·11=22. Боковая сторона = меньшему основанию = 14. P = 14+22+14+14 = 64.<br>
                    <strong>Ответ:</strong> 64.` },
        { text: "25. Медиана и высота прямоугольного треугольника, проведённые к гипотенузе, равны соответственно 13 см и 12 см. Найдите периметр данного треугольника.",
          solution: `<strong>Дано:</strong> прямоугольный ΔABC, ∠C=90°, медиана к гипотенузе = 13, высота = 12.<br>
                    <strong>Найти:</strong> периметр.<br>
                    <strong>Решение:</strong> Медиана к гипотенузе = половине гипотенузы ⇒ c = 2·13 = 26. Высота h=12. Из формул: a²+b²=c², a·b=c·h=312. (a+b)² = a²+b²+2ab = 676+624=1300 ⇒ a+b=√1300=10√13. Периметр = 10√13+26.<br>
                    <strong>Ответ:</strong> 10√13+26.` },
        { text: "26. В равнобедренном треугольнике АВС с основанием АС медианы АМ и СК пересекаются в точке О. Докажите, что треугольник АОС – равнобедренный, и найдите его боковые стороны, если АМ=21 см.",
          solution: `<strong>Дано:</strong> ΔABC, AB=BC, медианы AM и CK пересекаются в O. AM=21.<br>
                    <strong>Доказать:</strong> ΔAOC равнобедренный; найти AO и CO.<br>
                    <strong>Решение:</strong> В равнобедренном треугольнике медианы, проведённые к боковым сторонам, равны. Точка пересечения медиан делит каждую медиану в отношении 2:1 от вершины. AO = ⅔·AM = ⅔·21 = 14. Аналогично CO = ⅔·CK = 14 (так как CK=AM). Следовательно, AO=CO, ΔAOC равнобедренный с боковыми сторонами AO=CO=14.<br>
                    <strong>Ответ:</strong> боковые стороны = 14 см.` },
        { text: "27. В равнобокой трапеции основания равны 18 см и 12 см. Боковая сторона образует с основанием угол 30°. Найдите диагональ трапеции.",
          solution: `<strong>Дано:</strong> равнобедренная трапеция, AD=18, BC=12, ∠BAD=30°.<br>
                    <strong>Найти:</strong> диагональ AC.<br>
                    <strong>Решение:</strong> Проекция боковой стороны на основание: (AD−BC)/2 = 3. Боковая сторона AB = 3 / cos30° = 3 / (√3/2) = 6/√3 = 2√3. Высота h = AB·sin30° = 2√3·½ = √3. Проведём высоту из B, тогда AH=3, HD=12+3=15. Диагональ AC² = 15² + (√3)² = 225+3=228 ⇒ AC = 2√57.<br>
                    <strong>Ответ:</strong> 2√57.` }
    ];

    // ===================== 3. ФУНКЦИИ ОТОБРАЖЕНИЯ =====================
    function renderTickets() {
        const container = document.getElementById('ticketsContainer');
        for (let i = 1; i <= 17; i++) {
            const btn = document.createElement('div');
            btn.className = 'ticket-card';
            btn.textContent = `Билет №${i}`;
            btn.dataset.id = i;
            btn.addEventListener('click', () => {
                document.querySelectorAll('.ticket-card').forEach(c => c.classList.remove('active'));
                btn.classList.add('active');
                showTicketDetail(i);
            });
            container.appendChild(btn);
        }
    }

    function showTicketDetail(id) {
        const theory = ticketsTheory[id];
        const problem = fullProblemsList[id-1];
        const problemHtml = problem ? `
            <div class="badge">🎯 Задача билета</div>
            <div style="background:#00000055; padding:12px; border-radius:16px;">
                <strong>Условие:</strong> ${problem.text}
            </div>
            <div style="margin-top: 16px;">
                <strong>✅ Решение:</strong><br> ${problem.solution}
            </div>
        ` : '<p>Задача не найдена</p>';
        const html = `
            <div class="theory-item"><h3>📘 Вопрос 1</h3><p>${theory.part1}</p></div>
            <div class="theory-item"><h3>📗 Вопрос 2</h3><p>${theory.part2}</p></div>
            <div class="problem-solution">${problemHtml}</div>
        `;
        document.getElementById('detailPanel').innerHTML = html;
    }

    function renderAllProblems() {
        const container = document.getElementById('allProblemsList');
        container.innerHTML = '';
        fullProblemsList.forEach((p, idx) => {
            const card = document.createElement('div');
            card.className = 'problem-card';
            card.innerHTML = `
                <div class="problem-text">📌 ${p.text}</div>
                <div class="solution-block">${p.solution}</div>
            `;
            container.appendChild(card);
        });
    }

    function initTabs() {
        const btns = document.querySelectorAll('.tab-btn');
        const tabs = {
            tickets: document.getElementById('tickets-tab'),
            allproblems: document.getElementById('allproblems-tab')
        };
        btns.forEach(btn => {
            btn.addEventListener('click', () => {
                const target = btn.dataset.tab;
                btns.forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                Object.keys(tabs).forEach(key => {
                    tabs[key].classList.remove('active-tab');
                });
                tabs[target].classList.add('active-tab');
            });
        });
    }

    renderTickets();
    renderAllProblems();
    initTabs();
    setTimeout(() => {
        const firstCard = document.querySelector('.ticket-card');
        if(firstCard) firstCard.click();
    }, 50);
</script>
